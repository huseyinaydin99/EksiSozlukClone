<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="header" class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand logo" th:href="@{/}">
            <img th:src="@{/images/eksi_sozluk_logo.png}" alt="Logo" class="navbar-logo">
        </a>

        <div class="mx-auto w-50 position-relative">
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control sozluk-form-control" placeholder="sözlükte ara" autocomplete="off" style="border-radius: 20px 0 0 20px !important;">
                <div class="input-group-append">
                    <button class="btn btn-sozluk" type="button" style="border-radius: 0 20px 20px 0 !important; border-left: none;">
                        <span class="oi oi-magnifying-glass"></span>
                    </button>
                </div>
            </div>
            <div id="autocomplete-results" class="list-group position-absolute w-100 mt-1" style="z-index: 1000; display: none;">
            </div>
        </div>

        <div class="ml-auto d-flex align-items-center">
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
                <a th:href="@{/entry/create}" class="btn btn-sm btn-sozluk">entry oluştur</a>
                <a th:href="@{'/profile/' + ${#authentication.name}}" class="btn btn-sm btn-outline-sozluk">profilim</a>
                <div class="user-info-badge ml-2 mr-2">
                    <span class="small" sec:authentication="name">Kullanıcı</span>
                </div>
                <a th:href="@{/auth/logout}" class="btn btn-sm btn-link text-danger p-0" title="çıkış yap">
                    <span class="oi oi-account-logout"></span>
                </a>
            </div>
            <div sec:authorize="isAnonymous()" class="d-flex align-items-center gap-2">
                <a th:href="@{/auth/login}" class="btn btn-sm btn-sozluk">giriş yap</a>
                <a th:href="@{/auth/register}" class="btn btn-sm btn-outline-sozluk">kayıt ol</a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
