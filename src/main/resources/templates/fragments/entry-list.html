<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="entry-list(entries)" class="entry-list">
    <!-- Handle single entry or list -->
    <th:block th:each="entry : ${entries}">
        <div th:replace="~{fragments/entry-components :: entry-viewer(${entry})}"></div>
    </th:block>
</div>
</body>
</html>
