<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card bg-dark text-white border-secondary">
                <div class="card-header border-secondary">
                    <h3 class="text-center">giriş yap</h3>
                </div>
                <div class="card-body">
                    <div th:if="${param.success}" class="alert alert-success">
                        kayıt başarılı! giriş yapabilirsiniz.
                    </div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    
                    <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
                        <div class="form-group">
                            <label for="userName">kullanıcı adı</label>
                            <input type="text" th:field="*{userName}" class="form-control" id="userName" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></small>
                        </div>
                        <div class="form-group">
                            <label for="password">şifre</label>
                            <input type="password" th:field="*{password}" class="form-control" id="password" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                        </div>
                        <button type="submit" class="btn btn-sozluk btn-block">giriş</button>
                    </form>
                    <div class="text-center mt-3">
                        <a th:href="@{/auth/register}" class="text-success small">henüz hesabın yok mu? hemen kayıt ol.</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
