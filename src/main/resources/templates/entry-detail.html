<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
    <div layout:fragment="content">
        <div class="entry-detail">
            <h1 class="entry-subject" th:text="${entry.subject}">Subject</h1>
            
            <div class="entry-item mt-4">
                <div class="entry-content" th:text="${entry.content}">
                    Content goes here...
                </div>
                
                <div class="entry-footer d-flex justify-content-between align-items-center mt-3">
                    <div class="entry-vote">
                        <i class="fa fa-chevron-up"></i>
                        <span class="mx-2">0</span>
                        <i class="fa fa-chevron-down"></i>
                    </div>
                    
                    <div class="entry-info text-right">
                        <a href="#" class="entry-author" th:text="${entry.createdByUserName}">username</a>
                        <br>
                        <small class="entry-date" th:text="${#temporals.format(entry.createdDate, 'dd.MM.yyyy HH:mm')}">01.01.2023 12:00</small>
                    </div>
                </div>
            </div>
            
            <div class="entry-actions mt-4 border-top pt-3">
                <button class="btn btn-sm btn-outline-secondary">paylaş</button>
                <button class="btn btn-sm btn-outline-secondary">favori</button>
            </div>
        </div>
    </div>
</body>
</html>
