<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card bg-dark text-white border-secondary">
                <div class="card-header border-secondary">
                    <h3 class="text-center">kayıt ol</h3>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    
                    <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="firstName">ad</label>
                                <input type="text" th:field="*{firstName}" class="form-control" id="firstName" required>
                                <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="lastName">soyad</label>
                                <input type="text" th:field="*{lastName}" class="form-control" id="lastName" required>
                                <small class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="emailAddress">e-posta</label>
                            <input type="email" th:field="*{emailAddress}" class="form-control" id="emailAddress" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('emailAddress')}" th:errors="*{emailAddress}"></small>
                        </div>
                        <div class="form-group">
                            <label for="userName">kullanıcı adı</label>
                            <input type="text" th:field="*{userName}" class="form-control" id="userName" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></small>
                        </div>
                        <div class="form-group">
                            <label for="password">şifre</label>
                            <input type="password" th:field="*{password}" class="form-control" id="password" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                        </div>
                        <button type="submit" class="btn btn-sozluk btn-block">kayıt ol</button>
                    </form>
                    <div class="text-center mt-3">
                        <a th:href="@{/auth/login}" class="text-success small">zaten hesabın var mı? giriş yap.</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
