<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>bilgilerini güncelle</title>
</head>
<body>

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card bg-dark text-white border-secondary">
                <div class="card-header border-secondary">
                    <h4 class="mb-0 text-success">bilgilerini güncelle</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/update}" method="post">
                        <input type="hidden" name="id" th:value="${user.id}">
                        
                        <div class="mb-3">
                            <label class="form-label text-secondary small">kullanıcı adı</label>
                            <input type="text" name="userName" class="form-control bg-dark text-white border-secondary" th:value="${user.userName}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small">ad</label>
                                <input type="text" name="firstName" class="form-control bg-dark text-white border-secondary" th:value="${user.firstName}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small">soyad</label>
                                <input type="text" name="lastName" class="form-control bg-dark text-white border-secondary" th:value="${user.lastName}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary small">e-mail adresi</label>
                            <input type="email" name="emailAddress" class="form-control bg-dark text-white border-secondary" th:value="${user.emailAddress}" required>
                        </div>

                        <hr class="border-secondary my-4">
                        
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success">kaydet</button>
                            <a th:href="@{'/profile/' + ${user.userName}}" class="btn btn-outline-secondary">vazgeç</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
