<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>bilgilerini güncelle</title>
</head>
<body>

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-11">
            <div class="card profile-edit-card border-0 shadow-lg">
                <div class="card-header profile-edit-header">
                    <h2 class="mb-0 h4 font-weight-bold" style="letter-spacing: -0.5px;">profil ayarları</h2>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div class="row">
                        <!-- Sol Kolon: Bilgileri Güncelle -->
                        <div class="col-md-6 border-right-sozluk pr-md-5">
                            <h3 class="mb-4 h5 font-weight-bold text-success border-bottom pb-2">bilgilerini güncelle</h3>
                            <form th:action="@{/profile/update}" method="post">
                                <input type="hidden" name="id" th:value="${user.id}">
                                
                                <div class="form-group mb-4">
                                    <label class="small text-muted text-uppercase font-weight-bold mb-2">kullanıcı adı</label>
                                    <input type="text" name="userName" class="form-control sozluk-form-control" th:value="${user.userName}" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group mb-4">
                                            <label class="small text-muted text-uppercase font-weight-bold mb-2">adı</label>
                                            <input type="text" name="firstName" class="form-control sozluk-form-control" th:value="${user.firstName}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-4">
                                            <label class="small text-muted text-uppercase font-weight-bold mb-2">soyadı</label>
                                            <input type="text" name="lastName" class="form-control sozluk-form-control" th:value="${user.lastName}">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group mb-4">
                                    <label class="small text-muted text-uppercase font-weight-bold mb-2">e-posta</label>
                                    <input type="email" name="emailAddress" class="form-control sozluk-form-control" th:value="${user.emailAddress}" required>
                                </div>

                                <div class="mt-4 pt-2">
                                    <button type="submit" class="btn btn-success btn-sozluk btn-block shadow-sm">bilgileri kaydet</button>
                                </div>
                            </form>
                        </div>

                        <!-- Sağ Kolon: Şifre Değiştir -->
                        <div class="col-md-6 pl-md-5 mt-5 mt-md-0">
                            <div class="password-change-card h-100 border-0 m-0 p-0 bg-transparent">
                                <h3 class="mb-4 h5 font-weight-bold text-success border-bottom pb-2">şifre değiştir</h3>
                                <div id="password-alert" class="alert d-none mb-4"></div>
                                <form id="changePasswordForm">
                                    <div class="form-group mb-4">
                                        <label class="small text-muted text-uppercase font-weight-bold mb-2">eski şifre</label>
                                        <input type="password" name="oldPassword" class="form-control sozluk-form-control" placeholder="mevcut şifreniz" required>
                                    </div>
                                    <div class="form-group mb-4">
                                        <label class="small text-muted text-uppercase font-weight-bold mb-2">yeni şifre</label>
                                        <input type="password" id="newPassword" name="newPassword" class="form-control sozluk-form-control" placeholder="en az 6 karakter" required>
                                        <div class="progress mt-3" style="height: 6px; background-color: #2a2a2a;">
                                            <div id="password-strength-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                                        </div>
                                        <div class="d-flex justify-content-between mt-2">
                                            <small id="password-strength-text" class="text-muted small"></small>
                                            <small id="new-password-error" class="text-danger d-none small">minimum 6 karakter olmalı</small>
                                        </div>
                                    </div>
                                    <div class="form-group mb-4">
                                        <label class="small text-muted text-uppercase font-weight-bold mb-2">yeni şifre (tekrar)</label>
                                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" class="form-control sozluk-form-control" placeholder="yeni şifreyi onaylayın" required>
                                        <small id="confirm-password-error" class="text-danger d-none mt-2 d-block small">şifreler birbiriyle uyuşmuyor.</small>
                                    </div>
                                    <div class="mt-4 pt-2">
                                        <button type="submit" id="changePasswordBtn" class="btn btn-outline-success btn-block py-2">şifreyi güncelle</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script>
        $(document).ready(function() {
            const newPasswordInput = $('#newPassword');
            const confirmNewPasswordInput = $('#confirmNewPassword');
            const newPasswordError = $('#new-password-error');
            const confirmPasswordError = $('#confirm-password-error');
            const changePasswordBtn = $('#changePasswordBtn');

            function validatePasswords() {
                const newPassword = newPasswordInput.val();
                const confirmNewPassword = confirmNewPasswordInput.val();
                let isValid = true;

                // Anlık güç kontrolü
                checkPasswordStrength(newPassword);

                // Uzunluk kontrolü
                if (newPassword.length > 0 && newPassword.length < 6) {
                    newPasswordError.removeClass('d-none');
                    isValid = false;
                } else {
                    newPasswordError.addClass('d-none');
                }

                // Eşleşme kontrolü
                if (confirmNewPassword.length > 0 && newPassword !== confirmNewPassword) {
                    confirmPasswordError.removeClass('d-none');
                    isValid = false;
                } else {
                    confirmPasswordError.addClass('d-none');
                }

                // Buton durumunu güncelle (İsteğe bağlı, ancak kullanıcı her zaman basabilmek istiyorsa kaldırılabilir)
                // changePasswordBtn.prop('disabled', !isValid || newPassword.length === 0 || confirmNewPassword.length === 0);
                
                return isValid;
            }

            newPasswordInput.on('input', validatePasswords);
            confirmNewPasswordInput.on('input', validatePasswords);

            $('#changePasswordForm').on('submit', function(e) {
                e.preventDefault();
                
                if (!validatePasswords()) {
                    return;
                }
                
                const alert = $('#password-alert');
                const formData = $(this).serialize();
                
                $.ajax({
                    url: '/profile/change-password',
                    type: 'POST',
                    data: formData,
                    success: function(response) {
                        const msg = (typeof response === 'object' && response.message) ? response.message : response;
                        alert.removeClass('d-none alert-danger').addClass('alert-success').text(msg);
                        $('#changePasswordForm')[0].reset();
                        checkPasswordStrength('');
                        newPasswordError.addClass('d-none');
                        confirmPasswordError.addClass('d-none');
                    },
                    error: function(xhr) {
                        let errorMsg = 'Bir hata oluştu.';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            errorMsg = xhr.responseJSON.message;
                        } else if (xhr.responseText) {
                            try {
                                const json = JSON.parse(xhr.responseText);
                                errorMsg = json.message || xhr.responseText;
                            } catch(e) {
                                errorMsg = xhr.responseText;
                            }
                        }
                        alert.removeClass('d-none alert-success').addClass('alert-danger').text(errorMsg);
                    }
                });
            });
        });

        function checkPasswordStrength(password) {
            let strength = 0;
            const bar = $('#password-strength-bar');
            const text = $('#password-strength-text');

            if (password.length === 0) {
                bar.css('width', '0%');
                text.text('').removeClass('text-danger text-warning text-success');
                return;
            }

            if (password.length >= 6) strength += 20;
            if (password.match(/[a-z]+/)) strength += 20;
            if (password.match(/[A-Z]+/)) strength += 20;
            if (password.match(/[0-9]+/)) strength += 20;
            if (password.match(/[$@#&!]+/)) strength += 20;

            bar.css('width', strength + '%');

            if (strength < 40) {
                bar.attr('class', 'progress-bar bg-danger');
                text.text('Zayıf şifre').attr('class', 'text-danger d-block mt-1');
            } else if (strength < 80) {
                bar.attr('class', 'progress-bar bg-warning');
                text.text('Orta derece şifre').attr('class', 'text-warning d-block mt-1');
            } else {
                bar.attr('class', 'progress-bar bg-success');
                text.text('Güçlü şifre').attr('class', 'text-success d-block mt-1');
            }
        }
    </script>
</th:block>

</body>
</html>
