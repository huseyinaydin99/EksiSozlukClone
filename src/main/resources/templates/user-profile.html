<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${user.userName} + ' - Profil'">Profil</title>
</head>
<body>

<div layout:fragment="content">
    <div class="card border-0 mb-5">
        <div class="card-body bg-darker d-flex justify-content-between align-items-center">
            <div>
                <h1 class="entry-subject mb-1" th:text="${user.userName}">Username</h1>
                <div class="text-muted small" th:text="${user.firstName} + ' ' + ${user.lastName}">Full Name</div>
            </div>
            <!--
            th:if="${currentUserName != null and #strings.equalsIgnoreCase(#strings.trim(currentUserName), #strings.trim(user.userName))}"
            -->
            <div>
                <a th:href="@{/profile/edit}" class="btn btn-outline-success">profili düzenle</a>
            </div>
        </div>
    </div>

    <div class="user-entries">
        <h4 class="mb-4 border-bottom border-secondary pb-2" style="color: #53a245; font-weight: 700;">yazdığı entry'ler</h4>
        
        <div th:each="entry : ${user.entries}">
            <div th:replace="~{fragments/entry-components :: entry-viewer(${entry})}"></div>
        </div>
        
        <div th:if="${user.entries.empty}" class="card bg-transparent border-secondary">
            <div class="card-body text-center text-muted py-5">
                henüz hiç entry girmemiş.
            </div>
        </div>
    </div>
</div>

</body>
</html>
