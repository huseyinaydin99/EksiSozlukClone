<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${user.userName} + ' - Profil'">Profil</title>
</head>
<body>

<div layout:fragment="content">
    <div class="user-profile-header mb-4 p-3 bg-darker rounded">
        <h2 class="text-success" th:text="${user.userName}">Username</h2>
        <p class="text-secondary" th:text="${user.firstName} + ' ' + ${user.lastName}"></p>
        <hr class="border-secondary">
    </div>

    <div class="user-entries">
        <h4 class="mb-3">yazdığı entry'ler</h4>
        
        <div th:each="entry : ${user.entries}" class="mb-4">
            <div th:replace="~{fragments/entry-components :: entry-viewer(${entry})}"></div>
            <hr class="border-secondary">
        </div>
        
        <div th:if="${user.entries.empty}" class="text-secondary">
            henüz hiç entry girmemiş.
        </div>
    </div>
</div>

</body>
</html>
